<!-- index.html: The main entry point for my website
     Contains basic HTML structure, links to external CSS file,
     and a script tag to link to external JavaScript file. -->
<!DOCTYPE html>
<html lang="en" >
    <head>
        <!-- Specify character encoding and device scale -->
        <meta charset="UTF-8" >
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Title of the page, seen in the browser bar -->
        <title>My Website</title>
        <!-- Link to external stylesheet -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1> Hello, world! </h1>
        <!-- Link to external JavaScript file -->
        <script> src = "script.js" </script>
    </body> 
</html>
