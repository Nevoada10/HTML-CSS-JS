<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">  <!-- Ensuring proper rendering and touch zooming on Internet Explorer -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman to Integer</title>
    <head>
    <link id="blue-style" rel="stylesheet" href="styles.css" enabled>
</head>

<body>
    <header>
        <h1>Roman to Integer</h1>
    </header>

    <main>
        <input type="text" id="number" placeholder="Enter a Roman numeral">
        <button id="convert-btn" type="button" onclick="intToRoman()">Convert</button>
        <span><p id="output"></p></span>
        <script src="script.js"></script>
    </main>

</body>
