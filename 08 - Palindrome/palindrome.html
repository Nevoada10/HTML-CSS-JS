<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">  <!-- Ensuring proper rendering and touch zooming on Internet Explorer -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>
    <h1>Palindrome Checker</h1>
    <p>Enter a string to check if it's a palindrome:</p>
    <input type="text" id="text-input">
    <button id="check-btn" onclick="checkPalindrome()">Check</button>
    <p id="result"></p>
</body>
</html>
