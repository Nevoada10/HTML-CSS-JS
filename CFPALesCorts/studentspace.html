<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Space</title>
    <link rel="stylesheet" href="studentspace.css">
</head>
<body>
    <main>
        <!-- Logo Container -->
        <div class="logo-container">
            <img src="https://th.bing.com/th/id/OIP.sGxReCjBEgx8dEZtI7IlEQAAAA?rs=1&pid=ImgDetMain" alt="CFPA Les Corts Logo" class="school-logo">
        </div>

        <div class="student-dashboard">
            <h1>Student Dashboard</h1>
            
            <div class="subjects-container">
                <h2>My Subjects</h2>
                <div class="subject-card">
                    <h3>Mathematics</h3>
                    <div class="subject-stats">
                        <p>Attendance: <span class="attendance">85%</span></p>
                        <p>Grade: <span class="grade">B+</span></p>
                    </div>
                </div>
                <div class="subject-card">
                    <h3>Computer Science</h3>
                    <div class="subject-stats">
                        <p>Attendance: <span class="attendance">92%</span></p>
                        <p>Grade: <span class="grade">A</span></p>
                    </div>
                </div>
                <div class="subject-card">
                    <h3>Physics</h3>
                    <div class="subject-stats">
                        <p>Attendance: <span class="attendance">78%</span></p>
                        <p>Grade: <span class="grade">B</span></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
